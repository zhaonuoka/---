name = "ws-relay-proxy"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Custom domain for China GFW bypass (*.workers.dev intermittently blocked)
# To activate: Cloudflare Dashboard → Workers → ws-relay-proxy → Triggers → Custom Domains → Add ws.mythslabs.ai
# Requires: mythslabs.ai DNS zone in Cloudflare (orange-cloud proxied)

# Secrets (set via `wrangler secret put`):
# VOLCENGINE_API_KEY — 火山引擎 Ark API Key
# VOLCENGINE_APP_ID — 火山引擎 App ID
# MINIMAX_API_KEY — MiniMax API Key
# MINIMAX_GROUP_ID — MiniMax Group ID
# OPENAI_API_KEY — OpenAI API Key (not strictly needed, ephemeral tokens from client)
# XAI_API_KEY — xAI/Grok API Key (not strictly needed, token from client)
# FISH_AUDIO_API_KEY — Fish Audio TTS API Key (platform default, users can BYOK via ?token=)
# ALLOWED_ORIGINS — comma-separated allowed origins (e.g. "https://prometheus.mythslabs.ai,https://localhost:3000")

[vars]
ENVIRONMENT = "production"
